{% extends 'base.html' %}

{% block title %}Cadastro de Fornecedor - DIGO ERP{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h4 class="font-weight-bold mb-4"><i class="bi bi-patch-check me-2 text-primary"></i>{{ titulo }}</h4>
            
            <form method="POST">
                <div class="mb-3">
                    <label for="nome" class="form-label text-muted small">Razão Social / Nome Completo *</label>
                    <input type="text" class="form-control" id="nome" name="nome" value="{{ fornecedor.nome if fornecedor else '' }}" required placeholder="Ex: MC QUIMICA LTDA">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="cnpj" class="form-label text-muted small">CNPJ / CPF</label>
                        <input type="text" class="form-control" id="cnpj" name="cnpj" value="{{ fornecedor.cnpj if fornecedor else '' }}" placeholder="Apenas números">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="tipo" class="form-label text-muted small">Categoria *</label>
                        <select class="form-select" id="tipo" name="tipo" required>
                            <option value="materia_prima" {% if fornecedor and fornecedor.tipo == 'materia_prima' %}selected{% endif %}>Matéria-Prima</option>
                            <option value="embalagem" {% if fornecedor and fornecedor.tipo == 'embalagem' %}selected{% endif %}>Embalagem</option>
                            <option value="frete" {% if fornecedor and fornecedor.tipo == 'frete' %}selected{% endif %}>Frete / Logística</option>
                            <option value="outro" {% if fornecedor and fornecedor.tipo == 'outro' %}selected{% endif %}>Outro</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="telefone" class="form-label text-muted small">Telefone</label>
                        <input type="text" class="form-control" id="telefone" name="telefone" value="{{ fornecedor.telefone if fornecedor else '' }}" placeholder="(85) 99999-9999">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="email" class="form-label text-muted small">E-mail de Contato</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ fornecedor.email if fornecedor else '' }}" placeholder="comercial@fornecedor.com">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-9 mb-3">
                        <label for="cidade" class="form-label text-muted small">Cidade</label>
                        <input type="text" class="form-control" id="cidade" name="cidade" value="{{ fornecedor.cidade if fornecedor else '' }}" placeholder="Cidade">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="estado" class="form-label text-muted small">UF</label>
                        <input type="text" class="form-control" id="estado" name="estado" maxlength="2" value="{{ fornecedor.estado if fornecedor else '' }}" placeholder="CE">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="observacoes" class="form-label text-muted small">Observações Gerais</label>
                    <textarea class="form-control" id="observacoes" name="observacoes" rows="3">{{ fornecedor.observacoes if fornecedor else '' }}</textarea>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('fornecedores.index') }}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar Fornecedor</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
