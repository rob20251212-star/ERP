{% extends 'base.html' %}

{% block title %}Registrar Compra - DIGO ERP{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h4 class="font-weight-bold mb-4"><i class="bi bi-cart-check me-2 text-primary"></i>Registrar Nova Compra</h4>
            
            <form method="POST" id="compraForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="data" class="form-label text-muted small">Data da Compra *</label>
                        <input type="date" class="form-control" id="data" name="data" value="{{ hoje }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="numero_nf" class="form-label text-muted small">Número da Nota Fiscal (NF)</label>
                        <input type="text" class="form-control" id="numero_nf" name="numero_nf" placeholder="NF-e">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="materia_prima_id" class="form-label text-muted small">Matéria-Prima / Insumo *</label>
                        <select class="form-select" id="materia_prima_id" name="materia_prima_id" required>
                            <option value="">Selecione...</option>
                            {% for mp in mps %}
                            <option value="{{ mp.id }}">{{ mp.nome }} (Estoque atual: {{ mp.estoque_atual|round(2) }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="fornecedor_id" class="form-label text-muted small">Fornecedor *</label>
                        <input type="text" class="form-control" id="fornecedor_id" name="fornecedor_id" placeholder="Selecione o Fornecedor" autocomplete="off">
                        <div class="suggestion-box position-absolute bg-white border shadow rounded mt-1 w-100" style="display:none; z-index: 1000;"></div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="quantidade_sacos" class="form-label text-muted small">Quantidade (Sacos / Unidades) *</label>
                        <input type="number" step="0.01" class="form-control calc-trigger" id="quantidade_sacos" name="quantidade_sacos" required placeholder="0.00">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="preco_unitario" class="form-label text-muted small">Preço Unitário (R$) *</label>
                        <input type="number" step="0.0001" class="form-control calc-trigger" id="preco_unitario" name="preco_unitario" required placeholder="0.00">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="frete_total" class="form-label text-muted small">Valor do Frete Total (R$)</label>
                        <input type="number" step="0.01" class="form-control calc-trigger" id="frete_total" name="frete_total" value="0.00">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="prazo_pagamento" class="form-label text-muted small">Prazo de Pagamento (Dias)</label>
                        <input type="number" class="form-control" id="prazo_pagamento" name="prazo_pagamento" value="0" placeholder="0 para À Vista">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-muted small">Total Geral Estimado (Com Frete)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-secondary-subtle">R$</span>
                            <input type="text" class="form-control font-weight-bold" id="total_geral" readonly disabled value="0.00">
                        </div>
                    </div>
                </div>

             

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('compras.index') }}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Registrar Compra</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener("DOMContentLoaded", function() {
    const qtyInput = document.getElementById("quantidade_sacos");
    const priceInput = document.getElementById("preco_unitario");
    const freightInput = document.getElementById("frete_total");
    const totalInput = document.getElementById("total_geral");

    function calculateTotal() {
        const qty = parseFloat(qtyInput.value) || 0;
        const price = parseFloat(priceInput.value) || 0;
        const freight = parseFloat(freightInput.value) || 0;

        const subtotal = qty * price;
        const total = subtotal + freight;
        totalInput.value = total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    document.querySelectorAll(".calc-trigger").forEach(input => {
        input.addEventListener("input", calculateTotal);
    });
});
</script>
{% endblock %}
