{% extends 'base.html' %}

{% block title %}Novo Lançamento Financeiro - DIGO ERP{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h4 class="font-weight-bold mb-4"><i class="bi bi-journal-plus me-2 text-primary"></i>Novo Lançamento Manual</h4>
            
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="data" class="form-label text-muted small">Data do Lançamento *</label>
                        <input type="date" class="form-control" id="data" name="data" value="{{ hoje }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="tipo" class="form-label text-muted small">Tipo de Lançamento *</label>
                        <select class="form-select" id="tipo" name="tipo" required>
                            <option value="despesa" selected>Despesa (Saída)</option>
                            <option value="receita">Receita (Entrada)</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="valor" class="form-label text-muted small">Valor (R$) *</label>
                        <input type="number" step="0.01" class="form-control font-weight-bold text-center" id="valor" name="valor" required placeholder="0.00">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="categoria" class="form-label text-muted small">Categoria *</label>
                        <select class="form-select" id="categoria" name="categoria" required>
                            <option value="outro" selected>Outro / Administrativo</option>
                            <option value="salario">Salários / Pró-labore</option>
                            <option value="frete">Fretes</option>
                            <option value="embalagem">Embalagens / Adesivos</option>
                            <option value="compra">Compra de Materiais</option>
                            <option value="venda">Venda / Faturamento</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="descricao" class="form-label text-muted small">Descrição do Lançamento *</label>
                    <input type="text" class="form-control" id="descricao" name="descricao" required placeholder="Ex: Pagamento energia elétrica, aluguel, etc.">
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('financeiro.index') }}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Registrar Lançamento</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
