{% extends 'base.html' %}

{% block title %}{{ titulo }} - DIGO ERP{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h4 class="font-weight-bold mb-4"><i class="bi bi-person-gear me-2 text-primary"></i>{{ titulo }}</h4>
            
            <form method="POST">
                <div class="mb-3">
                    <label for="nome" class="form-label text-muted small">Razão Social / Nome Completo *</label>
                    <input type="text" class="form-control" id="nome" name="nome" value="{{ cliente.nome if cliente else '' }}" required placeholder="Ex: CONSTRUMIX LTDA">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="cpf_cnpj" class="form-label text-muted small">CPF ou CNPJ</label>
                        <input type="text" class="form-control" id="cpf_cnpj" name="cpf_cnpj" value="{{ cliente.cpf_cnpj if cliente else '' }}" placeholder="Apenas números">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="telefone" class="form-label text-muted small">Telefone</label>
                        <input type="text" class="form-control" id="telefone" name="telefone" value="{{ cliente.telefone if cliente else '' }}" placeholder="(85) 99999-9999">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label text-muted small">E-mail</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ cliente.email if cliente else '' }}" placeholder="email@exemplo.com">
                </div>

                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label for="endereco" class="form-label text-muted small">Endereço Completo</label>
                        <input type="text" class="form-control" id="endereco" name="endereco" value="{{ cliente.endereco if cliente else '' }}" placeholder="Rua, Número, Bairro">
                    </div>
                    <div class="col-md-3 col-8 mb-3">
                        <label for="cidade" class="form-label text-muted small">Cidade</label>
                        <input type="text" class="form-control" id="cidade" name="cidade" value="{{ cliente.cidade if cliente else '' }}" placeholder="Fortaleza">
                    </div>
                    <div class="col-md-1 col-4 mb-3">
                        <label for="estado" class="form-label text-muted small">UF</label>
                        <input type="text" class="form-control" id="estado" name="estado" maxlength="2" value="{{ cliente.estado if cliente else '' }}" placeholder="CE">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="observacoes" class="form-label text-muted small">Observações / Instruções de Entrega</label>
                    <textarea class="form-control" id="observacoes" name="observacoes" rows="3">{{ cliente.observacoes if cliente else '' }}</textarea>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('clientes.index') }}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar Cliente</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
